<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Skill Swap</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; }
        .header {
            background: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo { font-size: 24px; font-weight: bold; }
        .logo span:first-child { color: #667eea; }
        .logo span:last-child { color: #764ba2; }
        .nav a { margin-left: 25px; text-decoration: none; color: #555; }
        .logout-btn { background: #dc3545; color: white !important; padding: 8px 20px; border-radius: 25px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 30px; }
        .welcome-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 40px;
            border-radius: 20px;
            margin-bottom: 30px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }
        .stat-number { font-size: 36px; font-weight: bold; color: #667eea; }
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
        }
        .card h3 { margin-bottom: 20px; color: #667eea; }
        .skill-tag {
            display: inline-block;
            background: #e0e7ff;
            padding: 8px 16px;
            border-radius: 25px;
            margin: 5px;
            color: #667eea;
        }
        .btn-add {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
        }
        .empty-message { color: #888; padding: 15px 0; text-align: center; }
        @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } .header { flex-direction: column; gap: 15px; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><span>Skill</span> <span>Swap</span></div>
        <div class="nav">
            <a href="index.html">Home</a>
            <a href="search.html">Search</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="chat.html">Messages</a>
            <a href="#" id="logoutBtn" class="logout-btn">Logout</a>
        </div>
    </div>

    <div class="container">
        <div class="welcome-card"><h1 id="welcomeMessage">Welcome back! 👋</h1></div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="learnCount">0</div><div>Skills to Learn</div></div>
            <div class="stat-card"><div class="stat-number" id="teachCount">0</div><div>Skills to Teach</div></div>
        </div>
        <div class="main-grid">
            <div class="card"><h3>📚 Skills to Learn</h3><div id="learnSkillsList"><div class="empty-message">No skills added</div></div><button class="btn-add" onclick="addSkill('learn')">+ Add Skill</button></div>
            <div class="card"><h3>🎓 Skills to Teach</h3><div id="teachSkillsList"><div class="empty-message">No skills added</div></div><button class="btn-add" onclick="addSkill('teach')">+ Add Skill</button></div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if(!user) window.location.href = 'login.html';
        document.getElementById('welcomeMessage').innerHTML = `Welcome ${user.name}! 👋`;

        let learnSkills = [];
        let teachSkills = [];

        async function loadSkills() {
            try {
                const response = await fetch(`http://localhost:8002/api/skills/${user.id}`);
                const data = await response.json();
                learnSkills = data.skills.filter(s => s.skill_type === 'learn').map(s => s.skill_name);
                teachSkills = data.skills.filter(s => s.skill_type === 'teach').map(s => s.skill_name);
                displaySkills();
            } catch(error) {
                console.error('Error loading skills:', error);
            }
        }

        function displaySkills() {
            const learnContainer = document.getElementById('learnSkillsList');
            if(learnSkills.length === 0) learnContainer.innerHTML = '<div class="empty-message">No skills added</div>';
            else learnContainer.innerHTML = learnSkills.map(s => `<span class="skill-tag">${s}</span>`).join('');
            document.getElementById('learnCount').innerText = learnSkills.length;

            const teachContainer = document.getElementById('teachSkillsList');
            if(teachSkills.length === 0) teachContainer.innerHTML = '<div class="empty-message">No skills added</div>';
            else teachContainer.innerHTML = teachSkills.map(s => `<span class="skill-tag">${s}</span>`).join('');
            document.getElementById('teachCount').innerText = teachSkills.length;
        }

        window.addSkill = async function(type) {
            const skill = prompt(`Enter skill to ${type === 'learn' ? 'learn' : 'teach'}:`);
            if(skill && skill.trim()) {
                try {
                    const response = await fetch(`http://localhost:8002/api/skills/${user.id}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ skill_name: skill.trim(), skill_type: type })
                    });
                    if(response.ok) {
                        if(type === 'learn') learnSkills.push(skill.trim());
                        else teachSkills.push(skill.trim());
                        displaySkills();
                    }
                } catch(error) {
                    console.error('Error adding skill:', error);
                }
            }
        };

        document.getElementById('logoutBtn').addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        });

        loadSkills();
    </script>
</body>
</html>
