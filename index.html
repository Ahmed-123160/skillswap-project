<!-- نافذة تسجيل الدخول المنبثقة -->
<div id="signinModal" class="modal">
    <div class="modal-content">
        <h3>Sign In</h3>
        <input type="text" placeholder="Username" style="padding: 8px; margin: 10px 0; width: 80%; border-radius: 20px; border: 1px solid #ccc;">
        <input type="password" placeholder="Password" style="padding: 8px; margin: 10px 0; width: 80%; border-radius: 20px; border: 1px solid #ccc;">
        <br>
        <button onclick="closeModal()">Login</button>
        <button onclick="closeModal()">Cancel</button>
    </div>
</div>

<!-- رسالة منبثقة صغيرة -->
<div id="toast" class="toast"></div>

<script>
    // دالة عرض رسالة
    function showMessage(msg) {
        let toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 2000);
    }

    // دالة فتح نافذة تسجيل الدخول
    function openModal() {
        document.getElementById('signinModal').style.display = 'flex';
    }

    // دالة إغلاق النافذة
    function closeModal() {
        document.getElementById('signinModal').style.display = 'none';
    }

    // لما المستخدم يدوس على زر search
    document.querySelector('.landing-page-search button').addEventListener('click', function() {
        let input = document.querySelector('.landing-page-search input');
        let searchText = input.value;
        if (searchText.trim() === '') {
            showMessage('✏️ Please enter something to search');
        } else {
            showMessage('🔍 Searching for: "' + searchText + '"');
        }
    });

    // لما المستخدم يدوس Enter في حقل البحث
    document.querySelector('.landing-page-search input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            let searchText = this.value;
            if (searchText.trim() === '') {
                showMessage('✏️ Please enter something to search');
            } else {
                showMessage('🔍 Searching for: "' + searchText + '"');
            }
        }
    });

    // لما المستخدم يدوس على زر sign in
    let signinBtn = document.querySelector('.header-links button');
    if (signinBtn) {
        signinBtn.addEventListener('click', openModal);
    }

    // لما المستخدم يدوس على Join now
    let joinBtn = document.querySelector('.header-links a[href="#"]');
    let links = document.querySelectorAll('.header-links a');
    if (links[2]) {
        links[2].addEventListener('click', function(e) {
            e.preventDefault();
            showMessage('✨ Join now feature coming soon!');
        });
    }

    // لما المستخدم يدوس على Home
    if (links[0]) {
        links[0].addEventListener('click', function(e) {
            e.preventDefault();
            showMessage('🏠 Welcome to Home page');
        });
    }

    // لما المستخدم يدوس على Chating
    if (links[1]) {
        links[1].addEventListener('click', function(e) {
            e.preventDefault();
            showMessage('💬 Chat feature coming soon!');
        });
    }

    // لما المستخدم يدوس على أي كارد
    let cards = document.querySelectorAll('.cards');
    cards.forEach((card, index) => {
        card.addEventListener('click', function() {
            let title = this.querySelector('.card-name h2').textContent;
            let category = this.querySelector('.card-name p').textContent;
            showMessage(`📚 ${category}: ${title}`);
        });
    });

    // إغلاق النافذة لو ضغط براها
    window.onclick = function(event) {
        let modal = document.getElementById('signinModal');
        if (event.target === modal) {
            modal.style.display = 'none';
        }
    }
</script>
</body>
